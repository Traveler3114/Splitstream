[SystemSettings]
; ====================================================================
; TIER 1 OPTIMIZATION - Disable expensive UE5 features while
; preserving user-adjustable quality via SettingsWidget.
; ====================================================================

; --- Disable Lumen (biggest GPU savings on RTX 2060) ---
r.Lumen.DiffuseIndirect.Allow=0
r.Lumen.Reflections.Allow=0
r.Lumen.Reflections.HardwareRayTracing=0
r.Lumen.ScreenProbeGather.Allow=0
r.LumenScene.DirectLighting.Allow=0
r.LumenScene.Data=0
r.Lumen.Reflections.ScreenSpaceReconstruction.Allow=0
r.Lumen.TranslucencyVolume.Allow=0
r.Lumen.TranslucencyReflections.Allow=0

; --- Disable Virtual Shadow Maps ---
r.Shadow.Virtual.Enable=0

; --- Disable Nanite ---
r.Nanite.ProjectEnabled=0

; --- Disable Substrate rendering ---
r.Substrate=0

; --- Disable SkinCache ---
r.SkinCache.DefaultBehavior=0
r.SkinCache.CompileShaders=0

; --- Disable RayTracing entirely ---
r.RayTracing=0
r.RayTracing.Shadows=0

; --- CVars NOT exposed in SettingsWidget (safe to override) ---

; --- Disable expensive post-processing not in SettingsWidget ---
r.DefaultFeature.Bloom=0
r.DefaultFeature.MotionBlur=0
r.DefaultFeature.LensFlare=0
r.DefaultFeature.AutoExposure=0
r.DepthOfFieldQuality=0
r.SSR.Quality=0
r.SSGI.Quality=0
r.ReflectionMethod=0
r.ContactShadows=0

; --- Misc GPU savings ---
r.SkyAtmosphere=0
r.HeterogeneousVolumes=0
r.HairStrands=0
r.GenerateMeshDistanceFields=0

; --- Texture streaming ---
r.Streaming.LimitPoolSizeToVRAM=1
r.Streaming.FullyLoadUsedTextures=1
r.Streaming.DefragDynamicBounds=0
r.Streaming.Boost=0.5

; --- Shadow culling (waste reduction, not quality cap) ---
r.Shadow.RadiusThreshold=0.04
r.Shadow.CSM.TransitionScale=0.5

; --- Particle & Decal culling ---
r.ParticleLODBias=1
r.Decal.CullRatio=0.6
r.Emitter.FastPoolEnable=1

